<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nova Senha - PetCare Connect</title>

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --teal:#0d9488;
    --teal-dark:#0c6e6e;
    --navy:#1a2e44;
    --cream:#f0fafa;
    --white:#ffffff;
    --border:#b2dfdb;
    --text:#1a2e44;
    --text-muted:#4a7a78;
}

body{
    font-family:'DM Sans',sans-serif;
    background:
        linear-gradient(
            160deg,
            var(--teal) 0%,
            var(--teal-dark) 45%,
            var(--navy) 100%
        );

    min-height:100vh;

    display:flex;
    align-items:center;
    justify-content:center;

    padding:24px;
}

.card{
    width:100%;
    max-width:470px;

    background:rgba(255,255,255,.98);

    border-radius:28px;

    padding:36px;

    box-shadow:
        0 24px 60px rgba(0,0,0,.18);
}

.logo{
    width:78px;
    display:block;
    margin:0 auto 22px auto;
}

.title{
    font-family:'Sora',sans-serif;
    font-size:1.8rem;
    font-weight:700;
    color:var(--text);
    text-align:center;
    margin-bottom:10px;
}

.sub{
    text-align:center;
    color:var(--text-muted);
    font-size:.95rem;
    line-height:1.6;
    margin-bottom:28px;
}

.input-wrap{
    margin-bottom:18px;
}

.input-wrap label{
    display:block;
    margin-bottom:7px;
    font-size:.86rem;
    font-weight:700;
    color:var(--text);
}

.input-wrap input{
    width:100%;
    padding:14px 16px;
    border:1.5px solid var(--border);
    border-radius:14px;
    outline:none;
    font-size:.95rem;
    transition:.2s;
    background:#f8fffe;
}

.input-wrap input:focus{
    border-color:var(--teal);

    box-shadow:
        0 0 0 4px rgba(13,148,136,.10);
}

.btn{
    width:100%;
    border:none;
    background:var(--teal);
    color:#fff;
    padding:15px;
    border-radius:14px;
    font-size:1rem;
    font-weight:700;
    cursor:pointer;
    transition:.2s;
}

.btn:hover{
    background:var(--teal-dark);
}

.btn:disabled{
    opacity:.7;
    cursor:not-allowed;
}

.msg{
    margin-top:18px;
    border-radius:12px;
    padding:12px 14px;
    font-size:.9rem;
    display:none;
}

.msg.show{
    display:block;
}

.msg.error{
    background:#fef2f2;
    border:1px solid #fecaca;
    color:#dc2626;
}

.msg.success{
    background:#ecfdf5;
    border:1px solid #bbf7d0;
    color:#15803d;
}

.back{
    display:block;
    text-align:center;
    margin-top:24px;
    text-decoration:none;
    color:var(--teal-dark);
    font-weight:700;
    font-size:.92rem;
}

.back:hover{
    text-decoration:underline;
}

</style>
</head>
<body>

<div class="card">

    <img
        src="logo-petcare.png"
        class="logo"
        alt="PetCare Connect"/>

    <div class="title">
        Criar nova senha
    </div>

    <div class="sub">
        Defina sua nova senha para acessar
        o sistema novamente.
    </div>

    <div class="input-wrap">

        <label>Nova senha</label>

        <input
            type="password"
            id="novaSenha"
            placeholder="Digite sua nova senha"/>

    </div>

    <div class="input-wrap">

        <label>Confirmar senha</label>

        <input
            type="password"
            id="confirmarSenha"
            placeholder="Confirme sua nova senha"/>

    </div>

    <button
        class="btn"
        id="btnSalvar"
        onclick="salvarNovaSenha()">

        Salvar nova senha

    </button>

    <div id="msg" class="msg"></div>

    <a href="index.html" class="back">
        ← Voltar para login
    </a>

</div>

<script src="js/petcare-api.js"></script>

<script>

const params =
    new URLSearchParams(
        window.location.search
    );

const login =
    params.get('login');

async function salvarNovaSenha(){

    const novaSenha =
        document.getElementById('novaSenha')
            .value
            .trim();

    const confirmarSenha =
        document.getElementById('confirmarSenha')
            .value
            .trim();

    const msg =
        document.getElementById('msg');

    const btn =
        document.getElementById('btnSalvar');

    msg.className = 'msg';

    if(!novaSenha || !confirmarSenha){

        msg.classList.add(
            'show',
            'error'
        );

        msg.innerHTML =
            '⚠️ Preencha todos os campos.';

        return;
    }

    if(novaSenha.length < 6){

        msg.classList.add(
            'show',
            'error'
        );

        msg.innerHTML =
            '⚠️ A senha deve possuir pelo menos 6 caracteres.';

        return;
    }

    if(novaSenha !== confirmarSenha){

        msg.classList.add(
            'show',
            'error'
        );

        msg.innerHTML =
            '⚠️ As senhas não coincidem.';

        return;
    }

    btn.disabled = true;
    btn.innerText = 'Salvando...';

    const response =
        await petcareAlterarSenha(
            login,
            novaSenha
        );

    if(response.sucesso){

        msg.classList.add(
            'show',
            'success'
        );

        msg.innerHTML =
            '✅ Senha alterada com sucesso.';

        setTimeout(() => {

            window.location.href =
                'index.html';

        }, 1800);
    }
    else{

        msg.classList.add(
            'show',
            'error'
        );

        msg.innerHTML =
            '❌ ' + response.mensagem;
    }

    btn.disabled = false;
    btn.innerText = 'Salvar nova senha';
}

</script>

</body>
</html>
