<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Recuperar Senha - PetCare Connect</title>

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --teal:#0d9488;
    --teal-dark:#0c6e6e;
    --navy:#1a2e44;
    --cream:#f0fafa;
    --white:#ffffff;
    --border:#b2dfdb;
    --text:#1a2e44;
    --text-muted:#4a7a78;
}

body{
    font-family:'DM Sans',sans-serif;

    background:
        linear-gradient(
            160deg,
            var(--teal) 0%,
            var(--teal-dark) 45%,
            var(--navy) 100%
        );

    min-height:100vh;

    display:flex;
    align-items:center;
    justify-content:center;

    padding:24px;
}

.card{
    width:100%;
    max-width:460px;

    background:rgba(255,255,255,.98);

    border-radius:28px;

    padding:36px;

    box-shadow:
        0 24px 60px rgba(0,0,0,.18);
}

.logo{
    width:78px;
    display:block;
    margin:0 auto 22px auto;
}

.title{
    font-family:'Sora',sans-serif;
    font-size:1.8rem;
    font-weight:700;
    color:var(--text);
    text-align:center;
    margin-bottom:10px;
}

.sub{
    text-align:center;
    color:var(--text-muted);
    font-size:.95rem;
    line-height:1.6;
    margin-bottom:28px;
}

.input-wrap{
    margin-bottom:18px;
}

.input-wrap label{
    display:block;
    margin-bottom:7px;
    font-size:.86rem;
    font-weight:700;
    color:var(--text);
}

.input-wrap input{
    width:100%;
    padding:14px 16px;

    border:1.5px solid var(--border);

    border-radius:14px;

    outline:none;

    font-size:.95rem;

    transition:.2s;

    background:#f8fffe;
}

.input-wrap input:focus{
    border-color:var(--teal);

    box-shadow:
        0 0 0 4px rgba(13,148,136,.10);
}

.btn{
    width:100%;

    border:none;

    background:var(--teal);

    color:#fff;

    padding:15px;

    border-radius:14px;

    font-size:1rem;
    font-weight:700;

    cursor:pointer;

    transition:.2s;
}

.btn:hover{
    background:var(--teal-dark);
}

.btn:disabled{
    opacity:.7;
    cursor:not-allowed;
}

.msg{
    margin-top:18px;

    border-radius:12px;

    padding:12px 14px;

    font-size:.9rem;

    display:none;
}

.msg.show{
    display:block;
}

.msg.error{
    background:#fef2f2;
    border:1px solid #fecaca;
    color:#dc2626;
}

.msg.success{
    background:#ecfdf5;
    border:1px solid #bbf7d0;
    color:#15803d;
}

.back{
    display:block;

    text-align:center;

    margin-top:24px;

    text-decoration:none;

    color:var(--teal-dark);

    font-weight:700;

    font-size:.92rem;
}

.back:hover{
    text-decoration:underline;
}

</style>
</head>
<body>

<div class="card">

    <img
        src="logo-petcare.png"
        class="logo"
        alt="PetCare Connect"/>

    <div class="title">
        Recuperar senha
    </div>

    <div class="sub">
        Informe seu login e email cadastrados
        para redefinir sua senha.
    </div>

    <div class="input-wrap">

        <label>Login</label>

        <input
            type="text"
            id="login"
            placeholder="Digite seu login"/>

    </div>

    <div class="input-wrap">

        <label>Email</label>

        <input
            type="email"
            id="email"
            placeholder="Digite seu email"/>

    </div>

    <button
        class="btn"
        id="btnRecuperar"
        onclick="recuperarSenha()">

        Recuperar senha

    </button>

    <div id="msg" class="msg"></div>

    <a href="index.html" class="back">
        ← Voltar para login
    </a>

</div>

<script>

const API_BASE =
    'http://localhost:5000/api';

async function recuperarSenha(){

    const login =
        document.getElementById('login')
            .value
            .trim();

    const email =
        document.getElementById('email')
            .value
            .trim();

    const msg =
        document.getElementById('msg');

    const btn =
        document.getElementById('btnRecuperar');

    msg.className = 'msg';

    if(!login || !email){

        msg.classList.add(
            'show',
            'error'
        );

        msg.innerHTML =
            '⚠️ Preencha login e email.';

        return;
    }

    btn.disabled = true;
    btn.innerText = 'Aguarde...';

    try{

        const response = await fetch(
            `${API_BASE}/Auth/recuperar-senha`,
            {
                method:'POST',

                headers:{
                    'Content-Type':'application/json'
                },

                body:JSON.stringify({
                    login,
                    email
                })
            }
        );

        const data =
            await response.json();

        if(data.sucesso){

            msg.classList.add(
                'show',
                'success'
            );

            msg.innerHTML =
                '✅ Identidade confirmada.';

            setTimeout(() => {

                window.location.href =
                    `nova-senha.html?login=${encodeURIComponent(login)}`;

            }, 1200);
        }
        else{

            msg.classList.add(
                'show',
                'error'
            );

            msg.innerHTML =
                '❌ ' + data.mensagem;
        }

    }catch{

        msg.classList.add(
            'show',
            'error'
        );

        msg.innerHTML =
            '❌ Servidor offline.';
    }

    btn.disabled = false;
    btn.innerText = 'Recuperar senha';
}

</script>

</body>
</html>
